<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
  <meta name="color-scheme" content="dark">
  <title>Skybit — Pocket Sky Flyer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b1020; color: #eaeaf2;
                 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                 overscroll-behavior: none; touch-action: none; }
    body { display: flex; align-items: center; justify-content: center; }
    #frame { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px; }
    #canvas { background: #0b1020; max-width: 100%; max-height: 100vh;
              border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    #loading { color: #b7c0e4; font-size: 14px; letter-spacing: 0.3px; text-align: center;
               padding: 10px 16px; }
    #loading b { color: #ffd24a; font-weight: 600; }
    a { color: #9ad5ff; }
    @media (max-width: 420px) {
      #frame { gap: 4px; padding: 0; }
      #canvas { border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div id="frame">
    <div id="loading">
      <b>Skybit</b> — loading Pygame WebAssembly runtime (first load ~10&nbsp;MB, cached afterwards)&hellip;
    </div>
    <canvas id="canvas" width="360" height="640"></canvas>
  </div>

  <script id="config" type="application/json">
  {
    "archive": "skybit",
    "autorun": 1,
    "xtermjs": 0,
    "ume_block": 0,
    "can_close": 1,
    "icon": ""
  }
  </script>
  <script src="https://pygame-web.github.io/archives/0.9/pythons.js"
          data-src="vtx,gui,fs"
          async defer
          id="site" config="#config"></script>
</body>
</html>
