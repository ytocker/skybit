name: Deploy to GitHub Pages (leaderboard branch)

on:
  push:
    branches: [v1_leaderboard_feature]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygame 'pygbag>=0.9'

      - name: Build WASM bundle
        run: python -m pygbag --build main.py

      - name: Inject theme and Supabase leaderboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python inject_theme.py

      - name: Write minimal COOP/COEP service worker
        # GitHub Pages can't set HTTP headers, so we use a service worker instead.
        # We write our own minimal SW rather than using coi-serviceworker.js from
        # CDN because that library adds a controllerchange listener that reloads the
        # page every time the SW updates — causing an infinite reload loop on the
        # second visit. Our SW only reloads once, guarded by crossOriginIsolated.
        run: |
          cat > build/web/coi-sw.js << 'SWEOF'
          // Minimal COOP/COEP service worker for GitHub Pages.
          // Uses "credentialless" COEP (matches Netlify config) so pygbag's CDN
          // package fetches from pygame-web.github.io are not blocked.
          self.addEventListener('install', () => self.skipWaiting());
          self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
          self.addEventListener('fetch', e => {
            // Chrome bug: 'only-if-cached' + cross-origin = TypeError
            if (e.request.cache === 'only-if-cached' && e.request.mode !== 'same-origin') return;
            if (!e.request.url.startsWith('http')) return;
            e.respondWith(
              fetch(e.request).then(res => {
                if (!res || res.status === 0) return res;
                const h = new Headers(res.headers);
                h.set('Cross-Origin-Embedder-Policy', 'credentialless');
                h.set('Cross-Origin-Opener-Policy', 'same-origin');
                return new Response(res.body, {status: res.status, statusText: res.statusText, headers: h});
              }).catch(() => fetch(e.request))
            );
          });
          SWEOF

          python3 - <<'PY'
          from pathlib import Path
          p = Path("build/web/index.html")
          html = p.read_text()
          # Guard: if the page is already cross-origin isolated (SW already active),
          # skip registration entirely — no reload, no loop. Only register + reload
          # once on the very first visit when isolation isn't yet in place.
          sw = """<script>
          (function(){
            if(!('serviceWorker' in navigator)) return;
            if(self.crossOriginIsolated) return;
            navigator.serviceWorker.register('coi-sw.js').then(function(reg){
              function reload(){
                if(sessionStorage.getItem('_coi')) return;
                sessionStorage.setItem('_coi','1');
                location.reload();
              }
              if(reg.installing){
                reg.installing.addEventListener('statechange',function(e){
                  if(e.target.state==='activated') reload();
                });
              } else if(!navigator.serviceWorker.controller){
                reload();
              }
            });
          })();
          </script>"""
          html = html.replace("<head>", "<head>\n" + sw, 1)
          p.write_text(html)
          print("✓ custom coi-sw.js written and registered")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
