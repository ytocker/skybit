name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/retro-pixel-game-gPPYY]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Pages (first-run bootstrap)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Force pygbag autorun=1 at source
        run: |
          python3 - <<'PY'
          import pathlib, pygbag.app
          p = pathlib.Path(pygbag.app.__file__)
          txt = p.read_text(encoding="utf-8")
          needle = '"autorun": "0"'
          if needle not in txt:
              print("ERROR: could not find", needle, "in", p)
              raise SystemExit(1)
          p.write_text(txt.replace(needle, '"autorun": "1"'), encoding="utf-8")
          print("patched", p, "→ autorun=1")
          PY

      - name: Build web bundle
        run: pygbag --build --ume_block 0 --can_close 1 .

      - name: Dump head of generated index.html for debug
        run: head -c 4000 build/web/index.html || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
