name: Deploy to GitHub Pages

# Builds the pygbag web bundle and serves it via the GitHub-native Pages
# pipeline (actions/upload-pages-artifact + actions/deploy-pages).
#
# Cache-bust: every deploy rewrites the .apk + .tar.gz URLs inside the
# generated index.html with ?v=<commit-sha>, so the browser always
# fetches a fresh bundle even if the previous one is cached.
#
# One-time repo setting: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle (default pygbag template)
        run: pygbag --build --ume_block 0 --can_close 1 --width 360 --height 640 .

      - name: Cache-bust .apk and .tar.gz URLs with the commit SHA
        run: |
          sha="${{ github.sha }}"
          sed -i "s|claude_test\.apk|claude_test.apk?v=${sha}|g" build/web/index.html
          sed -i "s|claude_test\.tar\.gz|claude_test.tar.gz?v=${sha}|g" build/web/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
