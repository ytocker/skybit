name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle with custom template
        # We ship our own web.tmpl (vendored in repo root) so we control every
        # line of the generated HTML — no fighting the CDN template, no post-
        # build patches, no emscripten vs. our CSS arms race. The template:
        #   * uses full-viewport canvas CSS + MutationObserver JS override
        #     (beats emscripten's inline !important resizes, issue #6353)
        #   * neutralizes window_resize() to a no-op before pythons.js loads
        #   * unlocks the SDL AudioContext on first click/touch
        #   * bakes autorun=1 and fb_ar=0.5625 directly in the config block
        run: pygbag --build --ume_block 0 --can_close 1 --width 360 --height 640 --template ./web.tmpl .

      - name: Log generated index.html (for debugging post-deploy)
        run: head -c 6000 build/web/index.html || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
