name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/retro-pixel-game-gPPYY, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Show pygbag version
        run: python -c "import pygbag; print('pygbag', pygbag.__version__ if hasattr(pygbag, '__version__') else '(unknown)'); import pathlib; print(pathlib.Path(pygbag.__file__).parent / 'app.py')"

      - name: Patch pygbag CC["autorun"] → "1" (pre-build, belt)
        # pygbag hard-codes the autorun field at build time via a dict
        # literal in pygbag/app.py. No CLI flag, no ini option. The
        # .replace() below tolerates both spaced and unspaced forms.
        # This is the belt; the sed-after-build step below is the braces.
        run: |
          python - <<'PY'
          import pathlib, re, sys, pygbag
          p = pathlib.Path(pygbag.__file__).parent / "app.py"
          src = p.read_text()
          # Accept any whitespace between the key and the value.
          pat = re.compile(r'("autorun"\s*:\s*)"0"')
          if not pat.search(src):
              sys.exit("pygbag CC['autorun']='0' literal not found — template changed")
          new, n = pat.subn(r'\g<1>"1"', src)
          p.write_text(new)
          print(f"patched autorun → 1 ({n} occurrence) in {p}")
          PY

      - name: Build web bundle
        # --ume_block 0:  skip the User Media Engagement gate so the
        #                 runtime starts without needing an overlay click.
        # --can_close 1:  let the runtime clean up on page unload.
        # --width/height: match the game's 360×640 portrait canvas so
        #                 pygbag configures the framebuffer correctly
        #                 instead of defaulting to 1280×720 landscape.
        run: pygbag --build --ume_block 0 --can_close 1 --width 360 --height 640 .

      - name: Force autorun=1 in generated index.html (post-build, braces)
        # If the pre-build source patch didn't take (different pygbag
        # version, surprising whitespace, etc.), rewrite the rendered
        # HTML's config block directly. Fail the job if neither form
        # is found, so we never silently ship autorun=0 again.
        run: |
          python - <<'PY'
          import pathlib, re, sys
          p = pathlib.Path("build/web/index.html")
          html = p.read_text(encoding="utf-8")
          pat = re.compile(r'(autorun\s*:\s*)0\b')
          if pat.search(html):
              html, n = pat.subn(r'\g<1>1', html)
              p.write_text(html, encoding="utf-8")
              print(f"post-build: flipped autorun:0 → autorun:1 ({n} occurrence)")
          elif re.search(r'autorun\s*:\s*1\b', html):
              print("post-build: autorun already 1 (source patch worked)")
          else:
              print("=== FULL index.html ===")
              print(html)
              sys.exit("FATAL: no 'autorun: 0' or 'autorun: 1' in generated HTML")
          PY

      - name: Patch canvas CSS for full-viewport mobile display
        # Root causes identified from the pygbag 0.9 template:
        #
        # 1. fb_ar is hardcoded as 1.77 (landscape 16:9) in the template.
        #    pythons.js uses this ratio when calling window_resize() to size
        #    the canvas via inline style — ignoring our portrait 360×640 game.
        #    Fix: patch fb_ar to 0.5625 (portrait 9:16 = 360/640).
        #
        # 2. window_resize() sets canvas.style.width/height/transform as
        #    inline styles which override normal CSS rules.
        #    Fix: use CSS !important, which beats non-!important inline styles.
        #
        # 3. Previous JS transform ran at window.load when canvas.width==1,
        #    producing a garbage scale value. Dropped entirely.
        run: |
          python - <<'PY'
          import pathlib, re
          p = pathlib.Path("build/web/index.html")
          html = p.read_text(encoding="utf-8")

          # Fix 1 — correct the hardcoded landscape aspect ratio.
          before = html
          html = re.sub(r'fb_ar\s*:\s*1\.77', 'fb_ar   :  0.5625', html)
          if html == before:
              print("WARNING: fb_ar:1.77 not found — template may have changed")
          else:
              print("patched fb_ar 1.77 → 0.5625 (portrait 9:16)")

          # Fix 2 — Force canvas to fullscreen via inline !important JS override.
          #
          # ROOT CAUSE (verified via emscripten issue #6353, won't-fix):
          # Emscripten calls canvas.style.setProperty('width', Xpx, 'important')
          # from its Browser.updateCanvasDimensions() at arbitrary times.
          # An inline !important beats a stylesheet !important, so pure-CSS
          # rules (even with !important) lose every time SDL resizes.
          #
          # SOLUTION: MutationObserver watches canvas.style and re-applies
          # our desired inline !important on every change. The last-applied
          # inline !important wins; the idempotent guard (compare current vs
          # target) prevents infinite callback loops.
          #
          # Fix 3 — Web Audio unlock on first click (beats browser autoplay
          # policy before Python's pygame.mixer.init() fires).
          css_and_js = """
          <style>
          #transfer, #pyconsole, #terminal, .xterm, #infobox {
            display: none !important;
          }
          html, body {
            width: 100% !important; height: 100% !important;
            margin: 0 !important; padding: 0 !important;
            overflow: hidden !important;
            background: #000 !important;
          }
          </style>
          <script>
          (function() {
            'use strict';
            function computeSize() {
              var vw = window.innerWidth, vh = window.innerHeight;
              var s = Math.min(vw / 9, vh / 16);
              return { w: Math.round(9 * s), h: Math.round(16 * s) };
            }
            function applyStyle(c) {
              if (!c) return;
              var sz = computeSize();
              var left = Math.round((window.innerWidth  - sz.w) / 2);
              var top  = Math.round((window.innerHeight - sz.h) / 2);
              // Idempotency guard: if our target size is already applied,
              // skip to avoid infinite MutationObserver loops.
              if (c.style.width  === sz.w + 'px' &&
                  c.style.height === sz.h + 'px' &&
                  c.style.left   === left + 'px' &&
                  c.style.top    === top  + 'px') return;
              c.style.setProperty('position',        'fixed',       'important');
              c.style.setProperty('left',            left + 'px',   'important');
              c.style.setProperty('top',             top  + 'px',   'important');
              c.style.setProperty('right',           'auto',        'important');
              c.style.setProperty('bottom',          'auto',        'important');
              c.style.setProperty('width',           sz.w + 'px',   'important');
              c.style.setProperty('height',          sz.h + 'px',   'important');
              c.style.setProperty('margin',          '0',           'important');
              c.style.setProperty('transform',       'none',        'important');
              c.style.setProperty('image-rendering', 'pixelated',   'important');
              c.style.setProperty('z-index',         '5',           'important');
            }
            var canvas = null;
            var obs = new MutationObserver(function() { applyStyle(canvas); });
            function bind() {
              canvas = document.getElementById('canvas');
              if (!canvas) { setTimeout(bind, 50); return; }
              applyStyle(canvas);
              obs.observe(canvas, { attributes: true,
                attributeFilter: ['style', 'width', 'height'] });
              window.addEventListener('resize', function() { applyStyle(canvas); });
              window.addEventListener('orientationchange', function() {
                setTimeout(function() { applyStyle(canvas); }, 100);
              });
            }
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', bind);
            } else {
              bind();
            }
          })();

          // Unlock SDL's WebAudio context on first click/touch so that
          // pygame.mixer.init() (called later from Python) finds the
          // AudioContext already 'running'.
          (function() {
            function resumeSDLAudio() {
              var sdl = window.SDL2 || (window.Module && window.Module.SDL2);
              if (sdl && sdl.audioContext && sdl.audioContext.state !== 'running') {
                sdl.audioContext.resume();
              }
            }
            ['click', 'touchstart', 'keydown'].forEach(function(t) {
              document.addEventListener(t, resumeSDLAudio, { capture: true, passive: true });
            });
          })();
          </script>
          """
          html = html.replace("</head>", css_and_js + "</head>", 1)
          p.write_text(html, encoding="utf-8")
          print("canvas force-fullscreen JS + audio-unlock JS injected")
          PY

      - name: Verify final HTML has autorun=1
        run: |
          grep -E 'autorun\s*:\s*1' build/web/index.html
          echo "OK — autorun is 1"

      - name: Log generated index.html head
        # First 4 KB in the action log so post-deploy debugging doesn't
        # need another full CI run.
        run: head -c 4000 build/web/index.html || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
