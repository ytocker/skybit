name: Deploy Skybit to GitHub Pages

on:
  push:
    branches:
      - claude/retro-pixel-game-gPPYY
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag==0.9.3

      - name: Build WebAssembly bundle
        run: |
          python -m pygbag --build main.py
          ls -la build/web

      - name: Assemble site
        run: |
          mkdir -p _site
          cp play.html _site/index.html
          cp build/web/claude_test.apk _site/skybit.apk
          cp -r docs _site/docs
          # Favicon from existing screenshot if desired
          cp docs/screenshots/title.png _site/favicon.png || true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
