name: Deploy to GitHub Pages (leaderboard branch)

on:
  push:
    branches: [v1_leaderboard_feature]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygame 'pygbag>=0.9'

      - name: Build WASM bundle
        run: python -m pygbag --build main.py

      - name: Inject theme and Supabase leaderboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python inject_theme.py

      - name: Write minimal COOP/COEP service worker
        # GitHub Pages can't set HTTP headers. A service worker injects them instead.
        # SW only intercepts 'navigate' requests (the HTML page itself). All other
        # fetches — pygbag WASM, CDN Python packages, assets — pass through without
        # any interference so they can't cause hangs.
        # Registration script logic:
        #   1. Already cross-origin isolated? → exit (SW already working, no reload).
        #   2. Already reloaded once this session? → exit (prevents loops).
        #   3. Otherwise: register SW, wait for it to control the page, reload once.
        run: python3 - <<'PY'
          from pathlib import Path

          Path("build/web/coi-sw.js").write_text("""\
          self.addEventListener('install', () => self.skipWaiting());
          self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
          self.addEventListener('fetch', e => {
            // Only patch the top-level HTML document — every other fetch passes through.
            if (e.request.mode !== 'navigate') return;
            e.respondWith(
              fetch(e.request)
                .then(res => {
                  const h = new Headers(res.headers);
                  h.set('Cross-Origin-Embedder-Policy', 'credentialless');
                  h.set('Cross-Origin-Opener-Policy', 'same-origin');
                  return new Response(res.body, {status: res.status, statusText: res.statusText, headers: h});
                })
                .catch(() => fetch(e.request))
            );
          });
          """)

          reg = """<script>
          (function () {
            if (!('serviceWorker' in navigator)) return;
            if (self.crossOriginIsolated) return;
            if (sessionStorage.getItem('_coi')) return;
            navigator.serviceWorker.register('coi-sw.js').then(function () {
              var onCtrl = function () {
                navigator.serviceWorker.removeEventListener('controllerchange', onCtrl);
                sessionStorage.setItem('_coi', '1');
                location.reload();
              };
              navigator.serviceWorker.controller
                ? onCtrl()
                : navigator.serviceWorker.addEventListener('controllerchange', onCtrl);
            });
          }());
          </script>"""

          p = Path("build/web/index.html")
          html = p.read_text()
          html = html.replace("<head>", "<head>\n" + reg, 1)
          p.write_text(html)
          print("coi-sw.js written and registered")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
