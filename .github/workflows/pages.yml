name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/retro-pixel-game-gPPYY]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Pages (first-run bootstrap)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: pygbag --build --ume_block 0 --can_close 1 .

      - name: Flip autorun=1 in generated index.html
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("build/web/index.html")
          html = p.read_text(encoding="utf-8")
          new = re.sub(r'("autorun"\s*:\s*)("?)0("?)', r'\g<1>\g<2>1\g<3>', html)
          if new == html:
              print("WARNING: autorun pattern not matched in index.html — dumping head for debug")
              print(html[:4000])
          p.write_text(new, encoding="utf-8")
          PY

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
