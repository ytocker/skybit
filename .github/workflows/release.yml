name: Build Windows .exe

# Two ways to run this:
#   • Push a tag like  v1.0.0   → builds the .exe AND creates a GitHub
#     Release with skybit.exe attached as the download.
#   • Click "Run workflow" in the Actions tab → builds the .exe and
#     uploads it as a workflow artifact you can download from the run
#     summary. No release is created.
#
# Either way the produced binary is a single self-contained skybit.exe
# (~70 MB) that runs on Windows 10/11 with no Python install required.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release on tag pushes

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install pygame pyinstaller

      - name: Build skybit.exe
        # Note: --add-data uses `;` on Windows (vs `:` on Linux/macOS).
        run: pyinstaller --onefile --windowed --name skybit --add-data "game/assets;game/assets" main.py

      - name: Upload skybit.exe as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: skybit-windows
          path: dist/skybit.exe
          if-no-files-found: error

      - name: Attach skybit.exe to the GitHub Release (only on tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/skybit.exe
          generate_release_notes: true
