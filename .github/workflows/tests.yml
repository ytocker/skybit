name: tests

on:
  push:
    branches: [main, v3_skybit, v3_skybit_testing]
  pull_request:
    branches: [main, v3_skybit, v3_skybit_testing]

jobs:
  pytest:
    name: merge-safety tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDL system deps for pygame
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest -q

  pygbag-build:
    name: pygbag WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: |
          python -m pip install --upgrade pip
          pip install pygbag

      - name: Build WASM bundle (no-launch)
        # --build runs pygbag's compile step without starting the dev
        # server, so it's CI-friendly. If this fails, the deployable
        # artefact is broken — no merge should land.
        run: python -m pygbag --build main.py
