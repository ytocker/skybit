name: Deploy to GitHub Pages (v3_skybit_TS)

# Deploys the TypeScript + Canvas2D build under web/ to GitHub Pages.
# Replaces the pygbag/Pyodide pipeline used by the v1 workflow — the
# new bundle ships ~21 KB gzipped on cold start instead of ~4-6 MB.

on:
  push:
    branches: [v3_skybit_TS]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Matches the concurrency group used by the v1 workflow so only one
# GitHub Pages deploy is in flight at a time across the repo.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        env:
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
