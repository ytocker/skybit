# Pre-commit hooks for Skybit security.
# Install once with: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=2048']

  - repo: local
    hooks:
      - id: skybit-anon-key-check
        name: Skybit anon-key build leak check
        entry: python tools/check_anon_key.py
        language: system
        pass_filenames: false
        stages: [manual]  # run with `pre-commit run skybit-anon-key-check --hook-stage manual`
