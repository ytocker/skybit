async def custom_site():
    import embed

    bundle = "claude_test"
    appdir = Path(f"/data/data/{bundle}")
    appdir.mkdir()

    import tarfile
    async with platform.fopen("claude_test.tar.gz", "rb") as archive:
        tar = tarfile.open(fileobj=archive, mode="r:gz")
        tar.extractall(path=appdir.as_posix(), filter='tar')
        tar.close()

    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)

    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    if not platform.window.MM.UME:
        __import__(__name__).__file__ = main
        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)
    __import__(__name__).__file__ = main

    await shell.source(main)

    # DO NOT call window_resize() — our CSS/JS controls layout.
    print("web.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

// Force canvas CSS dimensions with inline !important. MutationObserver
// re-applies on every mutation (beats emscripten Browser.updateCanvasDimensions
// inline !important — verified behavior per emscripten issue #6353).
(function(){
  'use strict';
  function apply(c){
    if (!c) return;
    var vw = window.innerWidth, vh = window.innerHeight;
    if (c.style.width === vw + 'px' && c.style.height === vh + 'px') return;
    c.style.setProperty('position',        'fixed',     'important');
    c.style.setProperty('left',            '0',         'important');
    c.style.setProperty('top',             '0',         'important');
    c.style.setProperty('right',           'auto',      'important');
    c.style.setProperty('bottom',          'auto',      'important');
    c.style.setProperty('width',           vw + 'px',   'important');
    c.style.setProperty('height',          vh + 'px',   'important');
    c.style.setProperty('margin',          '0',         'important');
    c.style.setProperty('transform',       'none',      'important');
    c.style.setProperty('image-rendering', 'pixelated', 'important');
    c.style.setProperty('z-index',         '1',         'important');
    c.style.setProperty('display',         'block',     'important');
  }
  var obs = new MutationObserver(function(){
    var c = document.getElementById('canvas');
    apply(c);
  });
  function bind(){
    var c = document.getElementById('canvas');
    if (!c){ setTimeout(bind, 30); return; }
    apply(c);
    obs.observe(c, {attributes:true, attributeFilter:['style','width','height']});
    window.addEventListener('resize', function(){ apply(c); });
    window.addEventListener('orientationchange', function(){
      setTimeout(function(){ apply(c); }, 100);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind);
  else bind();
})();

// Native Web Audio playback — bypasses pygame.mixer which is unreliable
// in pygbag/Pyodide (pygbag issue #19, pygbag discussion #88). Python calls
// `platform.window.skyPlay(name, volume)` and the browser handles everything.
(function(){
  var SR = 22050;
  var ctx = null;
  var buffers = {};
  // Each def: array of [dur_s, f_start, f_end, shape, volume, attack_s, release_s]
  var defs = {
    flap:        [[0.07, 260, 520,  'square',   0.25, 0.004, 0.05]],
    coin:        [[0.10, 880, 1320, 'sine',     0.40, 0.004, 0.08]],
    coin_combo:  [[0.13, 1175,1760, 'sine',     0.45, 0.003, 0.09]],
    coin_triple: [
      [0.05,  880,  880,  'sine',     0.35, 0.01, 0.08],
      [0.06, 1175, 1175,  'sine',     0.40, 0.01, 0.08],
      [0.08, 1568, 1568,  'sine',     0.45, 0.01, 0.08]
    ],
    mushroom: [
      [0.08,  523,  523,  'triangle', 0.42, 0.01, 0.08],
      [0.08,  659,  659,  'triangle', 0.42, 0.01, 0.08],
      [0.14,  784,  988,  'triangle', 0.50, 0.01, 0.08]
    ],
    magnet: [
      [0.10,  220,  660,  'triangle', 0.40, 0.01, 0.08],
      [0.12,  660,  990,  'sine',     0.42, 0.01, 0.08]
    ],
    slowmo: [
      [0.10,  880,  660,  'triangle', 0.38, 0.01, 0.08],
      [0.10,  660,  440,  'triangle', 0.40, 0.01, 0.08],
      [0.18,  440,  220,  'sine',     0.45, 0.01, 0.08]
    ],
    thunder: [
      [0.20,   80,   60,  'triangle', 0.38, 0.01, 0.08],
      [0.20,   60,   50,  'triangle', 0.35, 0.01, 0.08],
      [0.40,   50,   40,  'sine',     0.32, 0.01, 0.08]
    ],
    death:    [[0.32, 330,  90, 'square',   0.45, 0.005, 0.18]],
    gameover: [
      [0.12,  523,  523,  'triangle', 0.35, 0.01, 0.08],
      [0.12,  440,  440,  'triangle', 0.35, 0.01, 0.08],
      [0.14,  349,  349,  'triangle', 0.38, 0.01, 0.08],
      [0.18,  262,  262,  'triangle', 0.42, 0.01, 0.08]
    ]
  };
  function synthSeg(data, offset, durS, f0, f1, shape, vol, atkS, relS){
    var n = Math.floor(durS * SR);
    var atk = Math.max(1, Math.floor(atkS * SR));
    var rel = Math.max(1, Math.floor(relS * SR));
    var phase = 0;
    for (var i = 0; i < n; i++){
      var t = i / n;
      var f = f0 + (f1 - f0) * t;
      phase += f / SR;
      var env;
      if (i < atk) env = i / atk;
      else if (i > n - rel) env = Math.max(0, (n - i) / rel);
      else env = 1;
      var sinx = Math.sin(2 * Math.PI * phase);
      var s;
      if (shape === 'square') s = sinx > 0 ? 1 : -1;
      else if (shape === 'triangle'){
        var p = phase - Math.floor(phase);
        s = 4 * Math.abs(p - 0.5) - 1;
      } else s = sinx;
      data[offset + i] = s * env * vol;
    }
    return n;
  }
  function buildBuffer(segments){
    var total = 0;
    for (var i = 0; i < segments.length; i++) total += Math.floor(segments[i][0] * SR);
    var buf = ctx.createBuffer(1, total, SR);
    var data = buf.getChannelData(0);
    var off = 0;
    for (var i = 0; i < segments.length; i++){
      var s = segments[i];
      off += synthSeg(data, off, s[0], s[1], s[2], s[3], s[4], s[5], s[6]);
    }
    return buf;
  }
  function ensureReady(){
    if (ctx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      ctx = new AC();
      for (var name in defs) buffers[name] = buildBuffer(defs[name]);
      console.log('skyAudio: ready (' + Object.keys(buffers).length + ' sounds)');
    } catch(e){
      console.warn('skyAudio init failed:', e);
      ctx = null;
    }
  }
  function onGesture(){
    ensureReady();
    if (ctx && ctx.state !== 'running') ctx.resume();
  }
  ['click','touchstart','keydown','pointerdown'].forEach(function(t){
    document.addEventListener(t, onGesture, {capture:true, passive:true});
  });
  // Global entry point called from Python (audio.py) on emscripten.
  window.skyPlay = function(name, volume){
    if (!ctx || ctx.state !== 'running') return;
    var buf = buffers[name];
    if (!buf) return;
    var src = ctx.createBufferSource();
    src.buffer = buf;
    var gain = ctx.createGain();
    gain.gain.value = volume;
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  };
})();
</script>
