<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0d0820" />
<title>Skybit — Pocket Sky Flyer</title>

<style>
  /* Vendored Liberation Sans for crisp HUD text. */
  @font-face {
    font-family: "LiberationSans";
    font-weight: 400;
    font-style: normal;
    src: url("./fonts/LiberationSans-Regular.ttf") format("truetype");
    font-display: swap;
  }
  @font-face {
    font-family: "LiberationSans";
    font-weight: 700;
    font-style: normal;
    src: url("./fonts/LiberationSans-Bold.ttf") format("truetype");
    font-display: swap;
  }
  html, body {
    margin: 0; padding: 0;
    background: #0d0820;
    color: #fff;
    overflow: hidden;
    height: 100%;
    font-family: "LiberationSans", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; align-items: center; justify-content: center; }
  /* The 360x640 portrait canvas is the entire game. Scale-to-fit while
     preserving the aspect ratio so it works on any phone or desktop. */
  #game {
    display: block;
    background: #0d0820;
    image-rendering: pixelated;
    /* JS adjusts width/height to maintain 9:16. */
  }

  /* ── Loading / start overlay (shown until the game's first frame paints) */
  #skybit-loading {
    position: fixed; inset: 0;
    z-index: 2147483647;
    background: linear-gradient(180deg, #060115 0%, #12082a 45%, #0c1022 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; user-select: none; overflow: hidden; opacity: 1;
    transition: opacity 0.45s ease;
  }
  #skybit-loading.skybit-hidden { opacity: 0; pointer-events: none; }
  .star {
    position: absolute; background: #ffffff; border-radius: 50%;
    pointer-events: none;
    animation: twinkle var(--dur, 2s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.12; transform: scale(1.0); }
    50%       { opacity: 0.95; transform: scale(1.4); }
  }
  .skybit-title {
    font-family: "LiberationSans", Arial Black, Arial, sans-serif;
    font-size: clamp(54px, 14vw, 90px);
    font-weight: 900; letter-spacing: 8px;
    color: #f0c040; margin: 0;
    text-shadow:
      -3px 0 0 #a82010, 3px 0 0 #a82010,
      0 -3px 0 #a82010, 0 3px 0 #a82010,
      0 9px 8px rgba(0, 0, 0, 0.85);
    animation: float-title 3.4s ease-in-out infinite;
  }
  @keyframes float-title {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-14px); }
  }
  .skybit-sub {
    font-size: clamp(10px, 2.6vw, 14px);
    font-weight: 700; letter-spacing: 9px;
    color: #d8b855; margin: 14px 0 56px; opacity: 0.82;
    text-transform: uppercase;
  }
  .tap-btn {
    font-family: "LiberationSans", Arial Black, Arial, sans-serif;
    font-size: clamp(13px, 3.6vw, 18px); font-weight: 900;
    letter-spacing: 4px; color: #fff;
    background: linear-gradient(180deg, #c84018 0%, #7e1c02 100%);
    border: 2px solid #e86828; border-radius: 60px;
    padding: 16px 52px; white-space: nowrap;
    box-shadow: 0 5px 30px rgba(200, 64, 20, 0.65),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
    animation: pulse-btn 1.8s ease-in-out infinite;
  }
  @keyframes pulse-btn {
    0%, 100% { opacity: 0.70; transform: scale(1.00); }
    50%       { opacity: 1.00; transform: scale(1.07); }
  }
  .mountains {
    position: absolute; bottom: 0; left: 0; right: 0;
    width: 100%; pointer-events: none;
  }

  /* ── Native HTML name-entry overlay (top-10 capture). */
  #name-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: linear-gradient(180deg, #060115 0%, #12082a 50%, #0c1022 100%);
    display: none; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden;
    font-family: "LiberationSans", Arial, sans-serif;
  }
  #name-overlay.skybit-shown { display: flex; }
  .ne-trophy { width: clamp(56px, 14vw, 80px); margin: 0 0 14px; }
  .ne-headline {
    font-weight: 900; letter-spacing: 2px; color: #f0c040;
    font-size: clamp(20px, 5.4vw, 28px); margin: 0 0 24px; text-align: center;
    text-shadow: -2px 0 0 #a82010, 2px 0 0 #a82010,
                 0 -2px 0 #a82010, 0 2px 0 #a82010,
                 0 7px 10px rgba(0,0,0,0.8);
  }
  #name-input {
    background: #0d0820; color: #f0c040;
    border: 2px solid #e86828; border-radius: 14px;
    padding: 16px 28px; font-size: clamp(20px, 5vw, 26px);
    font-weight: 700; letter-spacing: 4px; text-align: center;
    outline: none; width: min(78vw, 300px); box-sizing: border-box;
  }
  #name-counter { font-size: 13px; color: #d8b855; opacity: 0.6;
                  margin: 8px 0 24px; letter-spacing: 1px; }
  .ne-submit, .ne-skip {
    font-family: "LiberationSans", Arial Black, Arial, sans-serif;
    font-size: clamp(13px, 3.6vw, 18px); font-weight: 900;
    letter-spacing: 4px; color: #fff;
    background: linear-gradient(180deg, #c84018 0%, #7e1c02 100%);
    border: 2px solid #e86828; border-radius: 60px;
    padding: 16px 24px; min-width: 220px; text-align: center;
    cursor: pointer; white-space: nowrap;
  }
  .ne-skip { margin-top: 14px; }
</style>
</head>
<body>

<canvas id="game" width="360" height="640"></canvas>

<!-- Loading splash. Hidden by app.ts once the first frame paints. -->
<div id="skybit-loading">
  <p class="skybit-title">SKYBIT</p>
  <p class="skybit-sub">Pocket Sky Flyer</p>
  <div id="skybit-btn" class="tap-btn">TAP&nbsp;&middot;&nbsp;CLICK&nbsp;&middot;&nbsp;SPACE</div>
  <svg class="mountains" viewBox="0 0 1440 200" preserveAspectRatio="none"
       xmlns="http://www.w3.org/2000/svg">
    <path d="M0,200 L0,130 L60,70 L120,110 L200,40 L280,90 L360,20
             L440,75 L520,45 L600,100 L680,15 L760,80 L840,35 L920,95
             L1000,50 L1080,85 L1160,25 L1240,90 L1320,55 L1440,70 L1440,200 Z"
          fill="#0e1a0c" opacity="0.95"/>
    <path d="M0,200 L0,155 L80,125 L160,145 L240,108 L320,132 L400,95
             L480,128 L560,105 L640,135 L720,88 L800,120 L880,100 L960,130
             L1040,110 L1120,138 L1200,105 L1280,128 L1360,112 L1440,125 L1440,200 Z"
          fill="#0a1208" opacity="0.75"/>
  </svg>
</div>

<!-- Top-10 name capture (driven by leaderboard.ts when the player qualifies). -->
<div id="name-overlay">
  <svg class="ne-trophy" viewBox="0 0 60 72" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 18 Q 3 18 3 26 Q 3 35 11 36" fill="none"
          stroke="#f0c040" stroke-width="3" stroke-linecap="round"/>
    <path d="M50 18 Q 57 18 57 26 Q 57 35 49 36" fill="none"
          stroke="#f0c040" stroke-width="3" stroke-linecap="round"/>
    <polygon points="9,14 51,14 47,42 13,42"
             fill="#f0c040" stroke="#8c5a08" stroke-width="1.2"/>
    <line x1="14" y1="16" x2="46" y2="16" stroke="#fff8c8" stroke-width="1.2"/>
    <rect x="27" y="42" width="6" height="11"
          fill="#f0c040" stroke="#8c5a08" stroke-width="1"/>
    <rect x="18" y="53" width="24" height="5"
          fill="#f0c040" stroke="#8c5a08" stroke-width="1"/>
    <rect x="14" y="58" width="32" height="5"
          fill="#f0c040" stroke="#8c5a08" stroke-width="1"/>
  </svg>
  <p class="ne-headline">You made it to the top 10!</p>
  <input id="name-input" type="text" inputmode="text"
         autocapitalize="characters" autocorrect="off" autocomplete="off"
         spellcheck="false" maxlength="10"
         placeholder="TYPE YOUR NAME…"/>
  <p id="name-counter">0 / 10</p>
  <button id="name-submit" class="ne-submit">SUBMIT</button>
  <button id="name-skip" class="ne-skip">SKIP</button>
</div>

<script>
  // Sprinkle stars on the loading splash so it doesn't sit empty if the
  // bundle takes a moment to parse.
  (function () {
    var ov = document.getElementById('skybit-loading');
    if (!ov) return;
    for (var i = 0; i < 75; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      var sz = (Math.random() * 2.5 + 0.7).toFixed(1);
      s.style.cssText =
        'width:' + sz + 'px;height:' + sz + 'px;' +
        'top:'  + (Math.random() * 90).toFixed(1) + '%;' +
        'left:' + (Math.random() * 100).toFixed(1) + '%;' +
        '--dur:'   + (Math.random() * 3 + 1.3).toFixed(1) + 's;' +
        '--delay:' + (Math.random() * 4).toFixed(1) + 's;';
      ov.insertBefore(s, ov.firstChild);
    }
  })();
</script>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
