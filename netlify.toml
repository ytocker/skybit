[build]
  command = "pip install 'pygbag>=0.9' && python -m pygbag --build main.py"
  publish = "build/web"

[build.environment]
  PYTHON_VERSION = "3.11"

# WASM requires these headers for SharedArrayBuffer (used by pygbag audio).
# Without them the game loads but produces no sound and may freeze on some browsers.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy   = "same-origin"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
