# Netlify build + serve config for Skybit.
#
# Static deploy from the repo root: play.html + skybit.apk are already
# committed, so no build step is needed. Netlify auto-deploys on every push
# to the configured branch (set in the Netlify dashboard).

[build]
  publish = "."

# Serve play.html as the landing page.
[[redirects]]
  from = "/"
  to = "/play.html"
  status = 200

# Optional friendly alias.
[[redirects]]
  from = "/play"
  to = "/play.html"
  status = 200

# Long-cache the WebAssembly bundle — pygbag rebuilds replace it atomically.
[[headers]]
  for = "/skybit.apk"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Short-cache the HTML so updates roll out promptly.
[[headers]]
  for = "/play.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
