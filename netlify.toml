[build]
  base = "web"
  command = "npm ci && npm run build"
  publish = "web/dist"

[build.environment]
  NODE_VERSION = "20"

# Skybit v3: TypeScript + HTML5 Canvas2D. The previous pygbag/Pyodide
# build shipped a ~4-6 MB CPython interpreter on cold start; the v3
# bundle is ~21 KB gzipped (HTML + JS) with assets streamed lazily.
# Loading is now effectively instant on any connection.
#
# CSP: only Supabase REST is needed for the leaderboard. Fonts ship from
# self via @font-face, sounds from /sounds/*.ogg fetched by audio.ts.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy    = "default-src 'self'; connect-src 'self' https://*.supabase.co; script-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

# Always revalidate index.html and the entry JS bundle so a redeploy
# replaces the active build straight away. Vite's hashed asset filenames
# (assets/index-<hash>.js) are immutable per build and can be cached
# aggressively by browser defaults.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Hashed bundles are content-addressed; cache hard.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts: same content per build, cache hard.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sounds: same.
[[headers]]
  for = "/sounds/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
